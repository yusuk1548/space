        const compressImage = (file, maxWidth = 800, quality = 0.6) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
            });
        };

        // 가스별 4단계 위험 등급 판별 함수
        const getGasRisk = (type, val) => {
            const v = parseFloat(val);
            if (isNaN(v)) return 'LOW';
            if (type === 'o2') {
                if (v < 10.0) return 'ULTRA';
                if (v < 18.0 || v >= 23.5) return 'HIGH';
                if (v < 19.5) return 'MEDIUM';
                return 'LOW';
            }
            if (type === 'h2s') {
                if (v >= 100) return 'ULTRA';
                if (v >= 10) return 'HIGH';
                if (v >= 5) return 'MEDIUM';
                return 'LOW';
            }
            if (type === 'co') {
                if (v >= 1200) return 'ULTRA';
                if (v >= 30) return 'HIGH';
                if (v >= 15) return 'MEDIUM';
                return 'LOW';
            }
            if (type === 'co2') {
                if (v >= 4.0) return 'ULTRA';
                if (v >= 1.5) return 'HIGH';
                if (v >= 0.5) return 'MEDIUM';
                return 'LOW';
            }
            if (type === 'lel') {
                if (v >= 25) return 'ULTRA';
                if (v >= 10) return 'HIGH';
                if (v >= 5) return 'MEDIUM';
                return 'LOW';
            }
            return 'LOW';
        };

        const GAS_RISK_ORDER = ['LOW', 'MEDIUM', 'HIGH', 'ULTRA'];

            MEDIUM: 'text-yellow-500',
            HIGH: 'text-orange-500',
            ULTRA: 'text-red-600 font-bold',
        };

        const getRiskLevel = (gas) => {
            const { o2, co, h2s, lel, co2 } = gas;
            const ranks = [
                getGasRisk('o2', o2),
                getGasRisk('h2s', h2s),
                getGasRisk('co', co),
                getGasRisk('co2', co2),
                getGasRisk('lel', lel),
            ];
            const maxRank = ranks.reduce((best, r) =>
                GAS_RISK_ORDER.indexOf(r) > GAS_RISK_ORDER.indexOf(best) ? r : best, 'LOW');
            const MAP = {
                LOW: { level: 'LOW', label: '🔵 저위험 (안전)', color: 'bg-blue-100 text-blue-700' },
                MEDIUM: { level: 'MEDIUM', label: '🟡 중위험', color: 'bg-yellow-100 text-yellow-700' },
                HIGH: { level: 'HIGH', label: '🔴 고위험', color: 'bg-red-100 text-red-700' },
                ULTRA: { level: 'HIGH', label: '🚨 초고위험', color: 'bg-red-200 text-red-900' },
            };
            return MAP[maxRank];
        };

        // --- 로그인 화면 컴포넌트 (이메일 가입/로그인 + 구글 로그인 완벽 통합) ---
        const LoginScreen = () => {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [errorMsg, setErrorMsg] = React.useState('');
            const [isSignUp, setIsSignUp] = React.useState(false); // 가입 모드 전환 스위치

            // 이메일 로그인 & 회원가입 통합 처리
            const handleEmailAuth = (e) => {
                e.preventDefault();
                setErrorMsg(''); // 기존 에러 메시지 초기화

                if (isSignUp) {
                    // 회원가입 로직
                    firebase.auth().createUserWithEmailAndPassword(email, password)
                        .catch(error => setErrorMsg('회원가입 실패: ' + error.message));
                } else {
                    // 로그인 로직
                    firebase.auth().signInWithEmailAndPassword(email, password)
                        .catch(error => setErrorMsg('이메일 또는 비밀번호가 일치하지 않습니다.'));
                }
            };

            // 구글 간편 로그인 처리
            const handleGoogleLogin = () => {
                setErrorMsg('');
                const provider = new firebase.auth.GoogleAuthProvider();
                firebase.auth().signInWithPopup(provider)
                    .catch(error => {
                        console.error(error);
                        setErrorMsg('구글 로그인 오류: 파이어베이스 "승인된 도메인"에 깃허브 주소를 추가해주세요.');
                    });
            };

            return (
                <div className="min-h-screen bg-slate-800 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full border border-gray-200">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-extrabold text-blue-800 mb-2">KIHA 안전보건</h1>
                            <p className="text-gray-500 font-semibold mb-4">밀폐공간 위험성평가 플랫폼</p>
                            <p className="text-xs text-red-600 bg-red-50 border border-red-200 p-2 rounded-lg font-bold">
                                본 시스템은 관리자 모니터링 중이며 비인가 계정은 삭제됩니다.
                            </p>
                        </div>

                        <form onSubmit={handleEmailAuth} className="space-y-4 mb-6">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">이메일 계정</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 outline-none" placeholder="admin@kiha.org" required />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">비밀번호 (6자리 이상)</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 outline-none" placeholder="••••••••" required minLength="6" />
                            </div>

                            {errorMsg && <p className="text-red-500 text-sm font-bold text-center break-words">{errorMsg}</p>}

                            <button type="submit" className="w-full bg-slate-800 text-white font-bold py-3 rounded-lg hover:bg-slate-900 transition shadow-md">
                                {isSignUp ? '이메일로 회원가입' : '이메일로 로그인'}
                            </button>
                        </form>

                        <div className="text-center mb-6">
                            <button type="button" onClick={() => { setIsSignUp(!isSignUp); setErrorMsg(''); }} className="text-sm text-blue-600 hover:text-blue-800 font-bold underline transition">
                                {isSignUp ? '이미 계정이 있으신가요? 로그인하기' : '계정이 없으신가요? 회원가입하기'}
                            </button>
                        </div>

                        <div className="relative mb-6">
                            <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-300"></div></div>
                            <div className="relative flex justify-center text-sm"><span className="px-3 bg-white text-gray-400 font-bold">또는 간편하게 시작하기</span></div>
                        </div>

                        <button onClick={handleGoogleLogin} className="w-full bg-white border-2 border-gray-200 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-50 transition flex items-center justify-center gap-3 shadow-sm">
                            <svg className="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" /><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" /><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" /><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 15.02 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" /></svg>
                            Google 계정으로 계속하기
                        </button>
                    </div>
                </div>
            );
        };

        function App() {
            // ✅ [Rules of Hooks] 모든 Hook은 조건문/early return 없이 최상단에서 무조건 실행
            // ─── useState ───────────────────────────────────────────────
            const [activeTab, setActiveTab] = React.useState('diagnosis');
            const [user, setUser] = React.useState(null);
            const [authLoading, setAuthLoading] = React.useState(true);
            const [reportInfo, setReportInfo] = useState(() => {
                const today = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
                return {
                    year: new Date().getFullYear(),
                    companyName: '',
                    period: today,
                    agencyType: 'region',
                    agencyBranch: '대구지역본부'
                };
            });
            const [spaces, setSpaces] = useState([]);
            const [checklistResults, setChecklistResults] = useState({});
            const [mapImage, setMapImage] = useState(null);
            const [finalOpinion, setFinalOpinion] = useState("");
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [programInfo, setProgramInfo] = useState(() => {
                const today = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
                return {
                    revisionType: '제정',
                    revisionDate: today,
                    managers: [
                        { role: '프로그램 총괄 책임자', name: '', tel: '' },
                        { role: '프로그램 관리자', name: '', tel: '' },
                        { role: '추진 팀원(외주업체)', name: '', tel: '' },
                        { role: '추진 팀원(구매담당)', name: '', tel: '' },
                        { role: '추진 팀원(정비보수담당)', name: '', tel: '' },
                    ],
                    hasMeter: false,
                    meterModel: '',
                    meterCalDate: today,
                    hasFan: false,
                    fanModel: '',
                    fanCalDate: today,
                };
            });
            const [toastMsg, setToastMsg] = React.useState('');
            const [selectedSpaceItem, setSelectedSpaceItem] = React.useState(null);
            const [deferredPrompt, setDeferredPrompt] = React.useState(null);
            const [showIosPrompt, setShowIosPrompt] = React.useState(false);
            const [summary, setSummary] = React.useState('');
            const [showFastTrackModal, setShowFastTrackModal] = React.useState(false);
            const [companyName, setCompanyName] = React.useState('');
            const [programDate, setProgramDate] = React.useState(() => new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0]);
            const [revisionDate, setRevisionDate] = React.useState('');
            const [programDirector, setProgramDirector] = React.useState('');
            const [programManager, setProgramManager] = React.useState('');
            const [teamMemberExt, setTeamMemberExt] = React.useState('');
            const [teamMemberPur, setTeamMemberPur] = React.useState('');
            const [teamMemberMaint, setTeamMemberMaint] = React.useState('');
            const [emerContacts, setEmerContacts] = React.useState({ director: '', dirPhone: '', manager: '', manPhone: '', teamExt: '', teamExtPhone: '', teamPur: '', teamPurPhone: '', teamMaint: '', teamMaintPhone: '' });
            const [equipment, setEquipment] = React.useState({ oxygen: '보유', gas: '보유', vent: '보유', mask: '보유', tripod: '보유', rescue: '보유' });

            // ─── useRef ─────────────────────────────────────────────────
            const printRef = React.useRef();
            const fileInputRef = useRef(null);

            // ─── useEffect ──────────────────────────────────────────────
            React.useEffect(() => {
                const unsubscribe = firebase.auth().onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const saved = localStorage.getItem('kiha_data');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        const today = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
                        setSpaces(data.spaces || []);
                        setChecklistResults(data.checklist || {});
                        // period는 항상 오늘 날짜로 강제 주입 (저장된 이전 날짜가 덮어쓰는 것 방지)
                        setReportInfo(prev => ({ ...prev, ...data.info, period: today }));
                        setFinalOpinion(data.opinion || "");
                        setMapImage(data.map || null);
                    } catch (e) { }
                }
            }, []);

            useEffect(() => {
                try {
                    const data = { spaces, checklist: checklistResults, info: reportInfo, opinion: finalOpinion, map: mapImage };
                    localStorage.setItem('kiha_data', JSON.stringify(data));
                } catch (e) { console.error("Storage Limit"); }
            }, [spaces, checklistResults, reportInfo, finalOpinion, mapImage]);

            useEffect(() => {
                if (reportInfo.companyName) {
                    document.title = `${reportInfo.companyName}_밀폐공간 위험성평가 보고서`;
                } else {
                    document.title = '밀폐공간 위험성평가 솔루션';
                }
            }, [reportInfo.companyName]);


            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            // ─── useMemo ────────────────────────────────────────────────
            const defectSummary = useMemo(() => {
                const defects = [];
                CHECKLIST_MASTER.forEach(cat => cat.items.forEach(item => {
                    if (checklistResults[item.id] === 'FAIL') defects.push(item);
                }));
                return defects;
            }, [checklistResults]);

            const checklistAll = useMemo(() =>
                CHECKLIST_MASTER.flatMap(cat => cat.items.map(item => ({
                    id: item.id,
                    question: item.question,
                    status: checklistResults[item.id] || null
                })))
                , [checklistResults]);

            // ─── 이벤트 핸들러 (Hook 아님, 순서 무관) ────────────────────
            const handleSaveFile = () => {
                // ☁️ [1] Firestore 클라우드 전송 (맵이미지 제외)
                const currentUser = firebase.auth().currentUser;
                if (currentUser) {
                    db.collection("kiha_reports").add({
                        evaluatorName: currentUser.displayName || "이름없음",
                        evaluatorEmail: currentUser.email,
                        savedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        reportInfo,
                        spaces,
                        defectSummary,
                        finalOpinion,
                        checklistAll,
                        // mapImage 는 Firestore 1MB 제한 초과 방지를 위해 지역에서만 저장
                    })
                        .then(() => { setToastMsg('안전하게 저장이 완료되었습니다.'); setTimeout(() => setToastMsg(''), 3000); })
                        .catch(err => console.error("클라우드 저장 실패:", err));
                }
                // 💾 [2] 로컴 JSON 다운로드 (기존 로직, 병렬 실행)
                const fileName = reportInfo.companyName ? reportInfo.companyName : "무제";
                const data = { reportInfo, spaces, checklistResults, finalOpinion, mapImage };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${fileName}_밀폐공간평가_${new Date().toLocaleDateString().replace(/\./g, '').replace(/ /g, '')}.json`;
                link.click();
            };

            const handleLoadFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.reportInfo) setReportInfo(data.reportInfo);
                        if (data.spaces) setSpaces(data.spaces);
                        if (data.checklistResults) setChecklistResults(data.checklistResults);
                        if (data.finalOpinion) setFinalOpinion(data.finalOpinion);
                        if (data.mapImage) setMapImage(data.mapImage);
                        alert("데이터 로드 완료");
                    } catch (err) { alert("파일 오류"); }
                };
                reader.readAsText(file);
            };

            const handleReset = () => {
                if (confirm(`⚠️ [${reportInfo.companyName}] 데이터를 모두 삭제하고 초기화하시겠습니까?`)) {
                    setReportInfo({ year: new Date().getFullYear(), companyName: '', period: new Date().toLocaleDateString() + " (1일간)", agencyType: 'region', agencyBranch: '대구지역본부' });
                    setSpaces([]); setChecklistResults({}); setMapImage(null); setFinalOpinion("");
                    localStorage.removeItem('kiha_data');
                    alert("초기화 완료");
                    setActiveTab('cover');
                }
            };

            const handleInstallApp = () => {
                const isIos = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                if (isIos) {
                    setShowIosPrompt(true);
                } else if (window.deferredPrompt) {
                    window.deferredPrompt.prompt();
                    window.deferredPrompt.userChoice.then((choiceResult) => {
                        window.deferredPrompt = null;
                    });
                } else {
                    alert("현재 브라우저 환경에서는 자동 설치 팝업이 지원되지 않습니다.\n\n[수동 설치 방법]\n브라우저 우측 하단 메뉴(≡)를 누른 후 ➔ [현재 페이지 추가] ➔ [홈 화면]을 선택해 주세요.");
                }
            };
            const handleAutoGenerateSummary = () => {
                const currentSpaces = spaces || [];
                if (currentSpaces.length === 0) {
                    alert("등록된 밀폐공간 데이터가 없습니다. 현황 탭에서 먼저 데이터를 입력해 주세요.");
                    return;
                }
                let text = "[밀폐공간 위험성평가 총평 및 종합의견]\n\n";
                text += "당 사업장에는 현재 총 " + currentSpaces.length + "개의 밀폐공간이 존재하며, 확인된 주요 위험 공간 및 작업은 다음과 같습니다.\n\n";
                currentSpaces.forEach((s, i) => {
                    text += (i + 1) + ". " + (s.location || "위치 미상") + " (" + (s.name || "공간명 미상") + "): " + (s.workContent || s.cycle || "작업") + " 수행 중 질식 및 가스 중독 위험\n";
                });
                text += "\n이에 따라 작업 전 반드시 산소 및 유해가스 농도를 측정하고, 작업 중 지속적인 환기와 적절한 보호구(송기마스크 등) 착용을 엄격히 관리해야 합니다. 또한, 비상시를 대비한 구조 장비 비치와 모의 훈련을 정기적으로 실시하여 질식 사고를 원천적으로 예방할 것을 권고합니다.";
                setSummary(text);
                setFinalOpinion(text);
            };

            const handleProgramDownload = async () => {
                if (!companyName) {
                    alert('사업장명을 입력해주세요.');
                    return;
                }
                setToastMsg('문서를 생성 중입니다... (약 2~3초 소요)');
                const element = document.getElementById('pdf-print-template');
                if (!element) {
                    alert('PDF 템플릿을 찾을 수 없습니다. 잠시 후 다시 시도해주세요.');
                    setToastMsg('');
                    return;
                }
                const opt = {
                    margin:       0,
                    filename:     `밀페공간작업프로그램_${companyName}.pdf`,
                    image:        { type: 'jpeg', quality: 1.0 },
                    // scrollX: 0, scrollY: 0 옵션을 주어야 좌표가 틀어져서 짤리는 현상이 사라짐
                    html2canvas:  { scale: 2, useCORS: true, scrollX: 0, scrollY: 0 },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                  };
                html2pdf().set(opt).from(element).save().then(() => {
                    setToastMsg('');
                });
            };


            // ✅ [Fix] 모든 Hook 선언 완료. 이 아래에는 Hook이 전혀 없음.
            // 조건부 렌더링은 return() 내부 삼항 연산자로만 처리 (early return 완전 제거)
            return (
                authLoading ? (
                    <div className="flex items-center justify-center h-screen text-xl font-bold text-gray-600 bg-slate-100">보안 연결 중...</div>
                ) : !user ? (
                    <LoginScreen />
                ) : (
                    <React.Fragment>
                        {/* 인쇄 뷰 */}
                        <ReportView reportInfo={reportInfo} spaces={spaces} defectSummary={defectSummary} mapImage={mapImage} finalOpinion={finalOpinion} checklistAll={checklistAll} />

                        {/* 화면 뷰 */}
                        <div className="flex flex-col md:flex-row h-screen overflow-hidden print:hidden bg-gray-50 relative">

                            {/* 모바일 전용 상단 헤더 (md 이상에서는 숨김) */}
                            <div className="md:hidden flex items-center justify-between bg-white text-slate-800 px-4 py-2.5 z-40 shrink-0 border-b border-gray-200 shadow-sm relative">
                                <h1 className="text-lg font-bold flex items-center gap-2"><Icon name="shield-alert" className="text-yellow-400" size={18} /> SafeSpace</h1>
                                <div className="flex items-center gap-2">
                                    {/* 로그인 사용자 이름 */}
                                    <span className="text-sm font-medium text-gray-700 max-w-[80px] truncate hidden xs:block" style={{ display: 'block', maxWidth: '90px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{user.displayName || user.email?.split('@')[0]}</span>
                                    {/* 로그아웃 버튼 — 항상 노출 */}
                                    <button onClick={() => firebase.auth().signOut()} className="p-1.5 text-red-400"><Icon name="log-out" size={17} /></button>
                                    {/* 드롭다운 토글 버튼 (⋮) */}
                                    <button
                                        onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                                        className="flex items-center justify-center w-8 h-8 rounded-md border border-gray-300 bg-white text-gray-600 hover:bg-gray-100 transition-colors text-lg font-bold"
                                        aria-label="메뉴 열기"
                                    >
                                        ⋮
                                    </button>
                                </div>
                                {/* 드롭다운 배경(Backdrop) — 외부 클릭 시 메뉴 닫힘 */}
                                {isMobileMenuOpen && <div className="fixed inset-0 z-[190]" onClick={() => setIsMobileMenuOpen(false)}></div>}
                                {/* 드롭다운 메뉴 패널 */}
                                {isMobileMenuOpen && (
                                    <div className="absolute right-0 top-full mt-1 w-44 bg-white rounded-xl shadow-xl border border-gray-200 z-[200] overflow-hidden">
                                        <button
                                            onClick={() => { fileInputRef.current.click(); setIsMobileMenuOpen(false); }}
                                            className="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 border-b border-gray-100 transition-colors"
                                        >
                                            📁 <span>불러오기</span>
                                        </button>
                                        <button
                                            onClick={() => { handleReset(); setIsMobileMenuOpen(false); }}
                                            className="flex items-center gap-3 w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-red-50 border-b border-gray-100 transition-colors"
                                        >
                                            🔄 <span>초기화</span>
                                        </button>
                                        <button
                                            onClick={() => { handleSaveFile(); setIsMobileMenuOpen(false); }}

                                                <input type="text" value={emerContacts.teamMaintPhone} onChange={(e) => setEmerContacts({...emerContacts, teamMaintPhone: e.target.value})} className="flex-1 p-2 border rounded text-sm" placeholder="연락처" />
