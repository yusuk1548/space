                            <h2 className="text-2xl font-bold border-b-2 border-black pb-2 mb-6">3. 위험성평가 결과 및 등급 분류</h2>
                        </div>

                        <div className="mb-8 page-break-inside-avoid">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-l-4 border-blue-600 pl-3 bg-gray-50 py-1">
                                ■ 3-1. 위험성평가 등급 분류 기준 (2단계 통합 평가)
                            </h3>

                            {/* 1단계: 4단계 가스 기준표 (NIOSH IDLH) */}
                            <div className="mb-4">
                                <p className="font-bold text-gray-700 mb-2 text-sm">▶ 1단계: 가스 농도 기반 위험성 평가 (안전보건규칙 및 NIOSH IDLH 기준 적용)</p>
                                <table className="w-full border-collapse border border-gray-400 text-[11px] text-center">
                                    <thead className="bg-gray-200">
                                        <tr>
                                            <th className="border border-gray-400 p-1">위험 등급</th>
                                            <th className="border border-gray-400 p-1">산소 (O2)</th>
                                            <th className="border border-gray-400 p-1">황화수소 (H2S)</th>
                                            <th className="border border-gray-400 p-1">일산화탄소 (CO)</th>
                                            <th className="border border-gray-400 p-1">이산화탄소 (CO2)</th>
                                            <th className="border border-gray-400 p-1">가연성가스 (LEL)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td className="border border-gray-400 p-1 font-bold text-green-700 bg-green-50">저위험<br />(안전 유지)</td>
                                            <td className="border border-gray-400 p-1">19.5% ~ 23.5% 미만</td>
                                            <td className="border border-gray-400 p-1">0 ~ 4 ppm</td>
                                            <td className="border border-gray-400 p-1">0 ~ 14 ppm</td>
                                            <td className="border border-gray-400 p-1">0 ~ 0.49%</td>
                                            <td className="border border-gray-400 p-1">0 ~ 4%</td>
                                        </tr>
                                        <tr>
                                            <td className="border border-gray-400 p-1 font-bold text-yellow-600 bg-yellow-50">중위험<br />(1차 경보)</td>
                                            <td className="border border-gray-400 p-1">18.0% 이상 ~ 19.5% 미만</td>
                                            <td className="border border-gray-400 p-1">5 ppm 이상 ~ 10 ppm 미만</td>
                                            <td className="border border-gray-400 p-1">15 ppm 이상 ~ 30 ppm 미만</td>
                                            <td className="border border-gray-400 p-1">0.5% 이상 ~ 1.5% 미만</td>
                                            <td className="border border-gray-400 p-1">5% 이상 ~ 10% 미만</td>
                                        </tr>
                                        <tr>
                                            <td className="border border-gray-400 p-1 font-bold text-orange-600 bg-orange-50">고위험<br />(법적 이탈)</td>
                                            <td className="border border-gray-400 p-1">10.0%~18.0% 미만 / 23.5% 이상</td>
                                            <td className="border border-gray-400 p-1">10 ppm 이상 ~ 99 ppm</td>
                                            <td className="border border-gray-400 p-1">30 ppm 이상 ~ 1,199 ppm</td>
                                            <td className="border border-gray-400 p-1">1.5% 이상 ~ 3.99%</td>
                                            <td className="border border-gray-400 p-1">10% 이상 ~ 24%</td>
                                        </tr>
                                        <tr>
                                            <td className="border border-gray-400 p-1 font-bold text-red-600 bg-red-50">초고위험<br />(IDLH/치사)</td>
                                            <td className="border border-gray-400 p-1">10.0% 미만</td>
                                            <td className="border border-gray-400 p-1">100 ppm 이상</td>
                                            <td className="border border-gray-400 p-1">1,200 ppm 이상</td>
                                            <td className="border border-gray-400 p-1">4.0% 이상</td>
                                            <td className="border border-gray-400 p-1">25% 이상</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            {/* 2단계: 매트릭스 및 최종 등급표 */}
                            <div>
                                <p className="font-bold text-gray-700 mb-2 text-sm">▶ 2단계: 다차원 매트릭스 평가 (가스 기준 충족 시 A × B × C 산출)</p>
                                <div className="flex flex-col md:flex-row gap-4">
                                    <table className="w-full md:w-1/2 border-collapse border border-gray-400 text-xs">
                                        <thead className="bg-gray-100">
                                            <tr>
                                                <th className="border border-gray-400 p-1">변수 (Variables)</th>
                                                <th className="border border-gray-400 p-1">배점 기준</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-left">
                                            <tr>
                                                <td className="border border-gray-400 p-1 font-bold text-center bg-gray-50">A. 구조/난이도</td>
                                                <td className="border border-gray-400 p-1">1(얕음/직접구조) ~ 4(복잡/매몰위험)</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-gray-400 p-1 font-bold text-center bg-gray-50">B. 작업 위험성</td>
                                                <td className="border border-gray-400 p-1">1(단순점검) ~ 3(화기/유기용제 취급)</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-gray-400 p-1 font-bold text-center bg-gray-50">C. 환경 제어</td>
                                                <td className="border border-gray-400 p-1">1(완벽 통제) ~ 2(통제 미흡/누락)</td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <table className="w-full md:w-1/2 border-collapse border border-gray-400 text-xs">
                                        <thead className="bg-gray-200">
                                            <tr>
                                                <th className="border border-gray-400 p-1 w-20">최종 등급</th>
                                                <th className="border border-gray-400 p-1 w-16">점수</th>
                                                <th className="border border-gray-400 p-1">관리 및 조치 기준</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-center">
                                            <tr>
                                                <td className="border border-gray-400 p-1 font-bold text-green-700">저위험</td>
                                                <td className="border border-gray-400 p-1">1~4점</td>
                                                <td className="border border-gray-400 p-1 text-left">일반 절차 준수 및 기본 보호구 착용</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-gray-400 p-1 font-bold text-yellow-600">중위험</td>
                                                <td className="border border-gray-400 p-1">5~8점</td>
                                                <td className="border border-gray-400 p-1 text-left">작업허가서(PTW) 엄격 적용, 지속 환기</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-gray-400 p-1 font-bold text-orange-600">고위험</td>
                                                <td className="border border-gray-400 p-1">9~12점</td>
                                                <td className="border border-gray-400 p-1 text-left">구출장비 사전 세팅, 호흡용 보호구 대기</td>
                                            </tr>
                                            <tr>
                                                <td className="border border-gray-400 p-1 font-bold text-red-600">초고위험</td>
                                                <td className="border border-gray-400 p-1">13점 이상</td>
                                                <td className="border border-gray-400 p-1 text-left font-bold">출입 절대 금지 / 작업 방식 전면 재검토</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div className="mb-8 page-break-inside-avoid">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-l-4 border-blue-600 pl-3 bg-gray-50 py-1">
                                ■ 3-2. 위험성평가 결과 요약
                            </h3>
                            <table className="w-full border-collapse border border-gray-400 text-xs text-center">
                                <thead className="bg-gray-200">
                                    <tr>
                                        <th className="border border-gray-400 p-2" rowSpan={2}>NO</th>
                                        <th className="border border-gray-400 p-2" rowSpan={2}>밀폐공간 명칭 (위치)</th>
                                        <th className="border border-gray-400 p-2" rowSpan={2}>1단계<br />가스 판정</th>
                                        <th className="border border-gray-400 p-1" colSpan={3}>2단계 매트릭스 변수</th>
                                        <th className="border border-gray-400 p-2" rowSpan={2}>합산<br />점수</th>
                                        <th className="border border-gray-400 p-2" rowSpan={2}>최종 등급</th>
                                    </tr>
                                    <tr>
                                        <th className="border border-gray-400 p-1 bg-gray-100">A(구조)</th>
                                        <th className="border border-gray-400 p-1 bg-gray-100">B(작업)</th>
                                        <th className="border border-gray-400 p-1 bg-gray-100">C(제어)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {spaces && spaces.map((space, index) => {
                                        // 1단계 가스 적합성 판정
                                        const isGasOk = space.gas && space.gas.o2 >= 18 && space.gas.o2 <= 23.5 && space.gas.h2s < 10 && space.gas.co < 30 && space.gas.lel < 10;
                                        const gasText = isGasOk ? '적합' : '이탈';
                                        const gasColor = isGasOk ? 'text-blue-600' : 'text-red-600 font-bold';

                                        // 2단계 매트릭스 점수 산출
                                        const mA = Number(space.matrixA) || 1;
                                        const mB = Number(space.matrixB) || 1;
                                        const mC = Number(space.matrixC) || 1;
                                        const score = mA * mB * mC;

                                        // 최종 등급 판정
                                        let finalGrade = '';
                                        let gradeColor = '';
                                        if (!isGasOk || score >= 13) {
                                            finalGrade = '초고위험'; gradeColor = 'text-red-600 font-bold bg-red-50';
                                        } else if (score >= 9) {
                                            finalGrade = '고위험'; gradeColor = 'text-orange-600 font-bold bg-orange-50';
                                        } else if (score >= 5) {
                                            finalGrade = '중위험'; gradeColor = 'text-yellow-600 font-bold bg-yellow-50';
                                        } else {
                                            finalGrade = '저위험'; gradeColor = 'text-green-700 font-bold bg-green-50';
                                        }

                                        return (
                                            <tr key={space.id || index}>
                                                <td className="border border-gray-400 p-2 text-gray-600">{index + 1}</td>
                                                <td className="border border-gray-400 p-2 text-left font-semibold">{space.name} <span className="text-gray-400 font-normal ml-1">({space.location})</span></td>
                                                <td className={`border border-gray-400 p-2 ${gasColor}`}>{gasText}</td>
                                                <td className="border border-gray-400 p-2">{mA}</td>
                                                <td className="border border-gray-400 p-2">{mB}</td>
                                                <td className="border border-gray-400 p-2">{mC}</td>
                                                <td className="border border-gray-400 p-2 font-bold text-gray-800">{score}</td>
                                                <td className={`border border-gray-400 p-2 ${gradeColor}`}>{finalGrade}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* [문제 5, 6, 7 완벽 해결] 6. 개별 상세 현황 (무조건 1페이지 고정) */}
                    {spaces.map((s, idx) => {
                        // 1단계 가스 적합성 판정 (4단계 알고리즘)
                        const o2 = Number(s.gas && s.gas.o2) || 0;
                        const h2s = Number(s.gas && s.gas.h2s) || 0;
                        const co = Number(s.gas && s.gas.co) || 0;
                        const lel = Number(s.gas && s.gas.lel) || 0;
                        const co2 = Number(s.gas && s.gas.co2) || 0;

                        let gasLevel = 1;
                        if (o2 < 10.0 || h2s >= 100 || co >= 1200 || lel >= 25 || co2 >= 4.0) gasLevel = 4;
                        else if ((o2 >= 10.0 && o2 < 18.0) || o2 >= 23.5 || (h2s >= 10 && h2s < 100) || (co >= 30 && co < 1200) || (lel >= 10 && lel < 25) || (co2 >= 1.5 && co2 < 4.0)) gasLevel = 3;
                        else if ((o2 >= 18.0 && o2 < 19.5) || (h2s >= 5 && h2s < 10) || (co >= 15 && co < 30) || (lel >= 5 && lel < 10) || (co2 >= 0.5 && co2 < 1.5)) gasLevel = 2;

                        // 2단계 매트릭스 점수 산출
                        const mA = Number(s.matrixA) || 1;
                        const mB = Number(s.matrixB) || 1;
                        const mC = Number(s.matrixC) || 1;
                        const score = mA * mB * mC;

                        let matrixLevel = 1;
                        if (score >= 13) matrixLevel = 4;
                        else if (score >= 9) matrixLevel = 3;
                        else if (score >= 5) matrixLevel = 2;

                        // 최종 등급 판정 (Max Rule)
                        const finalLevel = Math.max(gasLevel, matrixLevel);
                        let badgeText = '';
                        let badgeColor = '';

                        if (finalLevel === 4) {
                            badgeText = '초고위험';
                            badgeColor = 'bg-red-600 text-white';
                        } else if (finalLevel === 3) {
                            badgeText = '고위험';
                            badgeColor = 'bg-orange-500 text-white';
                        } else if (finalLevel === 2) {
                            badgeText = '중위험';
                            badgeColor = 'bg-yellow-500 text-white';
                        } else {
                            badgeText = '저위험';
                            badgeColor = 'bg-green-600 text-white';
                        }

                        return (
                            <div key={s.id} className="print-page print-fixed-page">
                                <h2 className="shrink-0 text-2xl font-bold border-b-2 border-black pb-2 mb-3">4-{idx + 1}. {s.name} 상세 현황</h2>

                                <div className="shrink-0 flex justify-between items-end mb-2">
                                    <div className="text-lg">
                                        <span className="font-bold text-gray-600 mr-2">위치:</span> {s.location}
                                        <span className="mx-3 text-gray-300">|</span>
                                        <span className="font-bold text-gray-600 mr-2">관리번호:</span> {s.id}
                                    </div>
                                    <div className={`px-4 py-1 rounded-full text-sm font-bold ${badgeColor} print:border print:border-gray-300`}>
                                        {badgeText}
                                    </div>
                                </div>

                                {/* 💡 핵심 수술: 사진 박스 높이를 70mm(7cm)로 철창치듯 완전히 고정!! 절대 늘어나지 않음!! */}
                                <div className="w-full flex items-center justify-center mb-3 border-2 border-slate-300 bg-slate-50 overflow-hidden rounded-lg shrink-0" style={{ height: '70mm' }}>
                                    {s.photo ? (
                                        <img src={s.photo} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                                    ) : (
                                        <span className="text-slate-400 text-xl font-bold">현장 사진 없음</span>
                                    )}
                                </div>

                                <div className="shrink-0 mb-3">
                                    <h3 className="font-bold text-lg mb-1 text-slate-700">📌 기본 정보 및 측정 데이터</h3>
                                    <table className="w-full border-collapse border border-slate-400 text-sm">
                                        <tbody>
                                            <tr>
                                                <th className="border border-slate-400 bg-slate-100 p-2 w-1/4">출입 주기</th>
                                                <td className="border border-slate-400 p-2 w-1/4">{s.cycle}</td>
                                                <th className="border border-slate-400 bg-slate-100 p-2 w-1/4">작업 인원</th>
                                                <td className="border border-slate-400 p-2 w-1/4">{s.personnel}</td>
                                            </tr>
                                            <tr>
                                                <th className="border border-slate-400 bg-slate-100 p-2">면적/체적 (㎥)</th>
                                                <td className="border border-slate-400 p-2">{s.area}㎥</td>
                                                <th className="border border-slate-400 bg-slate-100 p-2">측정 시기</th>
                                                <td className="border border-slate-400 p-2">{s.measureTime}</td>
                                            </tr>
                                            <tr>
                                                <th className="border border-slate-400 bg-slate-100 p-2">유해가스 농도</th>
                                                <td colSpan="3" className="border border-slate-400 p-2 bg-slate-50">
                                                    <div className="grid grid-cols-5 gap-2 text-center font-bold">
                                                        <div className={s.gas.o2 < 19.5 || s.gas.o2 > 23.5 ? 'text-red-600' : ''}>
                                                            <div className="text-xs text-gray-500 font-normal">산소(O2)</div>
                                                            {s.gas.o2}%
                                                        </div>
                                                        <div className={s.gas.h2s > 0 ? 'text-red-600' : ''}>
                                                            <div className="text-xs text-gray-500 font-normal">황화수소(H2S)</div>
                                                            {s.gas.h2s}ppm
                                                        </div>
                                                        <div className={s.gas.co > 25 ? 'text-red-600' : s.gas.co > 0 ? 'text-yellow-600' : ''}>
                                                            <div className="text-xs text-gray-500 font-normal">일산화탄소(CO)</div>
                                                            {s.gas.co}ppm
                                                        </div>
                                                        <div className={s.gas.lel > 10 ? 'text-red-600' : s.gas.lel >= 5 ? 'text-yellow-600' : ''}>
                                                            <div className="text-xs text-gray-500 font-normal">가연성가스(LEL)</div>
                                                            {s.gas.lel}%
                                                        </div>
                                                        <div className={s.gas.co2 > 1.5 ? 'text-red-600' : s.gas.co2 >= 1.0 ? 'text-yellow-600' : ''}>
                                                            <div className="text-xs text-gray-500 font-normal">이산화탄소(CO2)</div>
                                                            {s.gas.co2}%
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div className="shrink-0 border-t-2 border-dashed border-slate-300 pt-3">
                                    <h3 className="font-bold text-lg mb-1 text-blue-900 flex items-center gap-2">
                                        <Icon name="clipboard-check" className="text-blue-600" /> 개선 권고 사항 (Action Plan)
                                    </h3>
                                    <div className="bg-blue-50 p-3 rounded-xl border border-blue-200">
                                        <div className="font-bold text-base text-blue-800 mb-2">
                                            💡 조치 방향: {s.riskSolution?.direction || "지속 관리"}
                                        </div>
                                        <ul className="list-disc pl-5 space-y-1 text-slate-700 text-sm">
                                            {(s.riskSolution?.measures || ["기본 안전 수칙 준수"]).map((m, i) => (
                                                <li key={i}>{m}</li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        );
                    })}

                    {/* 7. 종합 의견 (페이지 자동 넘어감) */}
                    <div className="print-page print-flow-page">
                        <div className="break-inside-avoid">
                            <h2 className="text-2xl font-bold border-b-2 border-black pb-2 mb-6">5. 종합 의견</h2>
                            <div className="border border-gray-400 rounded-lg p-8 bg-white min-h-[300px]">
                                <pre className="whitespace-pre-wrap font-sans text-lg leading-relaxed">{finalOpinion || "작성된 종합 의견이 없습니다."}</pre>
                            </div>
                            <div className="mt-10 text-right">
                                <div className="text-2xl font-bold">대한산업보건협회 {reportInfo.agencyBranch}</div>
                                <div className="text-gray-500 mt-2">평가자: (인) _________________</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            // 브라우저가 다 켜지기도 전에 서비스워커부터 강제로 등록하여 WebAPK 생성 조건을 충족시킴
            navigator.serviceWorker.register('/space/sw.js', { scope: '/space/' })
                .then(reg => console.log('SW Registered!', reg))
                .catch(err => console.error('SW Error', err));
        }
    </script>
</body>

</html>
