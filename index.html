                                            <div className="w-full md:flex-1 pr-0 md:pr-4">
                                                <div className="font-medium text-base md:text-lg">{item.question}</div>
                                                <div className="text-xs text-blue-500 mt-1 flex items-center gap-1"><Icon name="book-open" size={12} /> {item.law}</div>
                                            </div>
                                            <div className="flex gap-2 w-full md:w-auto justify-start md:justify-end">
                                                {['PASS', 'FAIL', 'NA'].map(status => (
                                                    <button key={status} onClick={() => setResults({ ...results, [item.id]: status })} className={`flex-1 md:flex-none px-3 py-3 md:py-2 rounded text-sm font-bold border ${results[item.id] === status ? (status === 'PASS' ? 'bg-green-600 text-white' : status === 'FAIL' ? 'bg-red-600 text-white' : 'bg-gray-500 text-white') : 'bg-white hover:bg-gray-50'}`}>{status === 'PASS' ? '적합' : status === 'FAIL' ? '부적합' : '해당없음'}</button>
                                                ))}
                                            </div>
                                        </div>
                                        {results[item.id] === 'FAIL' && <div className="p-3 bg-red-50 text-red-700 rounded text-sm font-bold">💡 [개선대책] {item.action}</div>}
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        function StatusScreen({ spaces, setSpaces }) {
            const [form, setForm] = useState({
                name: '', location: '', area: '',
                gas: { o2: 20.9, co: 0, h2s: 0, lel: 0, co2: 0.03 }, photo: null,
                cycle: '청소시(비정기)', cycleDirect: '',
                personnel: '2인 1조', personnelDirect: '',
                measureTime: '환기 전', measureTimeDirect: '',
                matrixA: 1, matrixB: 1, matrixC: 1
            });
            const [isCustomName, setIsCustomName] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const risk = getRiskLevel(form.gas);

            // 가스 게이트키퍼 판단
            const { o2, h2s, co, lel } = form.gas;
            const isGasExceeded = o2 < 18 || o2 > 23.5 || h2s >= 10 || co >= 30 || lel >= 10;

            // 매트릭스 점수 및 최종 등급
            const matrixScore = form.matrixA * form.matrixB * form.matrixC;
            const getMatrixInfo = (s, gasExceeded) => {
                if (gasExceeded) return { label: '초고위험 (적정공기 기준 이탈)', badge: 'bg-red-700 text-white', bar: 'bg-red-700' };
                if (s <= 4) return { label: `저위험 (${s}점)`, badge: 'bg-green-100 text-green-800 border border-green-300', bar: 'bg-green-500' };
                if (s <= 8) return { label: `중위험 (${s}점)`, badge: 'bg-yellow-100 text-yellow-800 border border-yellow-300', bar: 'bg-yellow-400' };
                if (s <= 12) return { label: `고위험 (${s}점)`, badge: 'bg-orange-100 text-orange-800 border border-orange-300', bar: 'bg-orange-500' };
                return { label: `초고위험 (${s}점)`, badge: 'bg-red-100 text-red-800 border border-red-300', bar: 'bg-red-600' };
            };
            const matrixInfo = getMatrixInfo(matrixScore, isGasExceeded);

            const handleSave = () => {
                if (!form.name.trim()) return alert("설비를 선택하거나 명칭을 입력하세요");
                const matchedType = SPACE_TYPES.find(t => t.label === form.name);
                const finalHazards = matchedType ? matchedType.hazards.join(', ') : '';
                const finalLaw = matchedType ? matchedType.law : '규칙 별표18 제18호';
                const finalCycle = form.cycle === '직접 입력' ? form.cycleDirect : form.cycle;
                const finalPersonnel = form.personnel === '직접 입력' ? form.personnelDirect : form.personnel;
                const finalTime = form.measureTime === '직접 입력' ? form.measureTimeDirect : form.measureTime;
                const newId = `CS-${String(spaces.length + 1).padStart(2, '0')}`;
                const riskSolution = RISK_SOLUTIONS[risk.level] || RISK_SOLUTIONS['LOW'];

                setSpaces([...spaces, {
                    ...form, id: newId,
                    name: form.name.trim(), risk, hazards: finalHazards,
                    legalBasis: finalLaw, locationMap: null,
                    cycle: finalCycle, personnel: finalPersonnel, measureTime: finalTime,
                    riskSolution,
                    matrixA: form.matrixA, matrixB: form.matrixB, matrixC: form.matrixC,
                    matrixScore,
                    finalRiskLabel: matrixInfo.label,
                    finalRiskBadge: matrixInfo.badge,
                }]);

                setForm({
                    name: '', location: '', area: '',
                    gas: { o2: 20.9, co: 0, h2s: 0, lel: 0, co2: 0.03 }, photo: null,
                    cycle: '청소시(비정기)', cycleDirect: '',
                    personnel: '2인 1조', personnelDirect: '',
                    measureTime: '환기 전', measureTimeDirect: '',
                    matrixA: 1, matrixB: 1, matrixC: 1
                });
                setIsCustomName(false);
            };

            const handlePhoto = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsProcessing(true);
                    try {
                        const compressedDataUrl = await compressImage(file);
                        setForm(prev => ({ ...prev, photo: compressedDataUrl }));
                    } catch (err) { alert("이미지 오류"); } finally { setIsProcessing(false); }
                }
            };

            const matrixOptions = {
                A: [
                    { val: 1, label: '1 — 수직 3m 미만, 개구부 충분' },
                    { val: 2, label: '2 — 수직 3~6m, 표준 맨홀' },
                    { val: 3, label: '3 — 수직 6m 초과, 제한적 접근' },
                    { val: 4, label: '4 — 복합 경로 / 잠수 필요' },
                ],
                B: [
                    { val: 1, label: '1 — 정적 작업 (점검·육안)' },
                    { val: 2, label: '2 — 반동적 작업 (청소·보수)' },
                    { val: 3, label: '3 — 고동적 작업 (용접·굴착)' },
                ],
                C: [
                    { val: 1, label: '1 — 강제 환기 + 경보기 운영' },
                    { val: 2, label: '2 — 자연 환기 또는 장치 없음' },
                ],
            };

            return (
                <div className="flex flex-col md:flex-row h-full p-4 md:p-6 gap-4 md:gap-6 overflow-auto">
                    {/* ── 입력 폼 ── */}
                    <div className="w-full md:w-[420px] bg-white rounded-xl shadow p-4 md:p-6 overflow-auto space-y-4 shrink-0">
                        <h3 className="font-bold text-lg flex items-center gap-2"><Icon name="plus-circle" /> 신규 등록</h3>

                        {/* 설비 유형 */}
                        <div>
                            <label className="text-sm font-bold text-gray-600">설비 유형</label>
                            <select className="w-full p-3 md:p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 text-base"
                                value={isCustomName ? '기타 밀폐공간' : form.name}
                                onChange={(e) => {
                                    if (e.target.value === '기타 밀폐공간') { setIsCustomName(true); setForm({ ...form, name: '' }); }
                                    else { setIsCustomName(false); setForm({ ...form, name: e.target.value }); }
                                }}>
                                <option value="">선택하세요</option>
                                {SPACE_TYPES.map((t, i) => <option key={i} value={t.label}>{t.label}</option>)}
                            </select>
                            {isCustomName && (
                                <input type="text" placeholder="설비 명칭 직접 입력" className="w-full p-3 md:p-2 border border-gray-300 rounded-md mt-2 focus:ring-2 focus:ring-blue-500 bg-blue-50 text-base"
                                    value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} />
                            )}
                        </div>

                        {/* 위치·면적 */}
                        <div className="grid grid-cols-2 gap-2">
                            <div><label className="text-sm font-bold text-gray-600">위치</label><input type="text" className="w-full p-3 md:p-2 border rounded text-base" placeholder="지하1층" value={form.location} onChange={e => setForm({ ...form, location: e.target.value })} /></div>
                            <div><label className="text-sm font-bold text-gray-600">면적/체적</label><input type="text" className="w-full p-3 md:p-2 border rounded text-base" placeholder="50㎥" value={form.area} onChange={e => setForm({ ...form, area: e.target.value })} /></div>
                        </div>

                        {/* 출입 주기·인원·측정 시기 */}
                        <div>
                            <label className="text-sm font-bold text-gray-600">출입 주기</label>
                            <select className="w-full p-3 md:p-2 border rounded text-base" value={form.cycle} onChange={e => setForm({ ...form, cycle: e.target.value })}>
                                {CYCLE_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                            </select>
                            {form.cycle === '직접 입력' && <input type="text" className="w-full p-3 md:p-2 border rounded mt-1 text-base" placeholder="직접 입력" value={form.cycleDirect} onChange={e => setForm({ ...form, cycleDirect: e.target.value })} />}
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            <div><label className="text-sm font-bold text-gray-600">출입 인원</label>
                                <select className="w-full p-3 md:p-2 border rounded text-base" value={form.personnel} onChange={e => setForm({ ...form, personnel: e.target.value })}>
                                    {PERSONNEL_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                                </select>
                                {form.personnel === '직접 입력' && <input type="text" className="w-full p-3 md:p-2 border rounded mt-1 text-base" placeholder="N명" value={form.personnelDirect} onChange={e => setForm({ ...form, personnelDirect: e.target.value })} />}
                            </div>
                            <div><label className="text-sm font-bold text-gray-600">측정 시기</label>
                                <select className="w-full p-3 md:p-2 border rounded text-base" value={form.measureTime} onChange={e => setForm({ ...form, measureTime: e.target.value })}>
                                    {TIME_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                                </select>
                                {form.measureTime === '직접 입력' && <input type="text" className="w-full p-3 md:p-2 border rounded mt-1 text-base" placeholder="00:00~" value={form.measureTimeDirect} onChange={e => setForm({ ...form, measureTimeDirect: e.target.value })} />}
                            </div>
                        </div>

                        {/* 가스 농도 */}
                        <div className="bg-gray-50 p-4 rounded-lg border">
                            <h4 className="font-bold text-sm mb-3 text-gray-700">가스 농도 (최고치)</h4>
                            <div className="space-y-2">
                                <GasInput label="O2(%)" val={form.gas.o2} setVal={v => setForm({ ...form, gas: { ...form.gas, o2: v } })} gasType="o2" />
                                <GasInput label="H2S(ppm)" val={form.gas.h2s} setVal={v => setForm({ ...form, gas: { ...form.gas, h2s: v } })} gasType="h2s" />
                                <GasInput label="CO(ppm)" val={form.gas.co} setVal={v => setForm({ ...form, gas: { ...form.gas, co: v } })} gasType="co" />
                                <GasInput label="LEL(%)" val={form.gas.lel} setVal={v => setForm({ ...form, gas: { ...form.gas, lel: v } })} gasType="lel" />
                                <GasInput label="CO2(%)" val={form.gas.co2} setVal={v => setForm({ ...form, gas: { ...form.gas, co2: v } })} gasType="co2" />
                            </div>
                        </div>

                        {/* A×B×C 매트릭스 */}
                        <div className="bg-indigo-50 p-4 rounded-lg border border-indigo-200">
                            <h4 className="font-bold text-sm mb-3 text-indigo-800 flex items-center gap-2"><Icon name="layers" size={14} /> 다차원 매트릭스 (A × B × C)</h4>
                            {[
                                { key: 'matrixA', label: 'A. 구조/구출 난이도', opts: matrixOptions.A },
                                { key: 'matrixB', label: 'B. 작업 동적 위험도', opts: matrixOptions.B },
                                { key: 'matrixC', label: 'C. 환경 제어 수준', opts: matrixOptions.C },
                            ].map(({ key, label, opts }) => (
                                <div key={key} className="mb-3">
                                    <label className="text-xs font-bold text-indigo-700 block mb-1">{label}</label>
                                    <select className="w-full p-3 md:p-2 border border-indigo-200 rounded bg-white text-sm"
                                        value={form[key]}
                                        onChange={e => setForm({ ...form, [key]: parseInt(e.target.value) })}>
                                        {opts.map(o => <option key={o.val} value={o.val}>{o.label}</option>)}
                                    </select>
                                </div>
                            ))}
                        </div>

                        {/* 실시간 최종 위험 등급 표시 */}
                        {isGasExceeded ? (
                            <div className="p-3 bg-red-700 text-white rounded-xl font-bold text-center text-sm animate-pulse">
                                🚨 초고위험 — 적정공기 기준 이탈 (출입 절대 금지)
                            </div>
                        ) : (
                            <div className={`p-3 rounded-xl font-bold text-center text-sm border ${matrixInfo.badge}`}>
                                ⚠ 최종 위험 등급: {matrixInfo.label} ({form.matrixA}×{form.matrixB}×{form.matrixC}={matrixScore}점)
                            </div>
                        )}

                        {/* 사진 */}
                        <div>
                            <label className="text-sm font-bold text-gray-600 mb-1 block">현장 사진</label>
                            <div className="flex items-center gap-2">
                                <label className={`cursor-pointer bg-slate-200 hover:bg-slate-300 px-4 py-3 md:py-2 rounded text-sm flex items-center gap-2 ${isProcessing ? 'opacity-50 pointer-events-none' : ''}`}>
                                    <Icon name="camera" size={16} /> {isProcessing ? '압축 중...' : '사진 선택'}
                                    <input type="file" className="hidden" accept="image/*" onChange={handlePhoto} disabled={isProcessing} />
                                </label>
                                {form.photo && <span className="text-xs text-blue-600">완료</span>}
                            </div>
                            {form.photo && <img src={form.photo} className="mt-2 h-20 w-auto rounded border" />}
                        </div>

                        <button onClick={handleSave} disabled={isProcessing} className="w-full py-4 md:py-3 bg-slate-900 text-white font-bold rounded disabled:bg-gray-400 text-base">저장하기</button>
                    </div>

                    {/* ── 등록된 현황 카드 목록 ── */}
                    <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 content-start overflow-auto">
                        {spaces.map(s => (
                            <div key={s.id} className="bg-white p-4 rounded-xl shadow border relative">
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-xs font-bold text-gray-400">{s.id}</span>
                                    <span className={`text-xs px-2 py-1 rounded font-bold ${s.risk.color}`}>{s.risk.label}</span>
                                </div>
                                <div className="font-bold text-lg flex justify-between items-center">
                                    {s.name}
                                    {s.photo && <Icon name="image" size={16} className="text-blue-500" />}
                                </div>
                                <div className="text-sm text-gray-500 mb-2">{s.location}</div>
                                <div className="text-xs bg-gray-50 p-2 rounded grid grid-cols-5 gap-1 text-center mb-2">
                                    <div>O2: {s.gas.o2}</div>
                                    <div className={s.gas.h2s > 0 ? 'text-red-600 font-bold' : ''}>H2S: {s.gas.h2s}</div>
                                    <div>CO: {s.gas.co}</div>
                                    <div>LEL: {s.gas.lel}</div>
                                    <div>CO2: {s.gas.co2}</div>
                                </div>
                                {s.finalRiskLabel && (
                                    <div className={`text-xs px-2 py-1 rounded font-bold text-center ${s.finalRiskBadge || 'bg-gray-100 text-gray-700'}`}>
                                        매트릭스 최종: {s.finalRiskLabel}
                                    </div>
                                )}
                                <button onClick={() => setSpaces(spaces.filter(x => x.id !== s.id))} className="absolute top-2 right-2 text-gray-300 hover:text-red-500"><Icon name="trash-2" size={16} /></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const GasInput = ({ label, val, setVal, gasType }) => {
            const risk = getGasRisk(gasType, val);
            const inputColor = GAS_INPUT_COLOR[risk] || 'text-gray-800';
            return (
                <div className="flex justify-between items-center">
                    <label className={`text-xs font-bold ${risk !== 'LOW' ? GAS_INPUT_COLOR[risk] : 'text-gray-600'}`}>{label}</label>
                    <input
                        type="number"
                        className={`w-24 md:w-20 p-2 md:p-1 border rounded text-right font-bold text-base md:text-sm ${inputColor}`}
                        value={val}
                        onChange={e => setVal(e.target.value)}
                    />
                </div>
            );
        };

        function MapScreen({ spaces, mapImage, setMapImage, setSpaces }) {
            const [modal, setModal] = useState(false);
            const [pt, setPt] = useState(null);

            const handleMapClick = (e) => {
                if (!mapImage) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                setPt({ x, y });
                setModal(true);
            };

            const handleDragOver = (e) => { e.preventDefault(); };
            const handleDrop = (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file) {
                    compressImage(file, 1024, 0.7).then(result => setMapImage(result));
                }
            };

            const unmapped = spaces.filter(s => !s.locationMap);

            return (
                <div className="flex h-full p-6 gap-6">
                    <div className="flex-1 bg-white rounded shadow overflow-hidden relative flex flex-col">
                        <div className="p-4 bg-slate-800 text-white flex justify-between items-center">
                            <h3 className="font-bold flex items-center gap-2"><Icon name="map" /> 디지털 배치도</h3>
                            <label className="cursor-pointer bg-slate-600 hover:bg-slate-500 px-3 py-1 rounded text-xs">
                                이미지 업로드 <input type="file" className="hidden" accept="image/*" onChange={e => {
                                    const file = e.target.files[0];
                                    if (file) compressImage(file, 1024, 0.7).then(result => setMapImage(result));
                                }} />
                            </label>
                        </div>
                        <div className="flex-1 bg-gray-100 overflow-auto relative flex items-center justify-center" onDragOver={handleDragOver} onDrop={handleDrop}>
                            {mapImage ? (
                                <div className="relative inline-block cursor-crosshair shadow-lg" onClick={handleMapClick}>
                                    <img src={mapImage} className="block max-w-none" style={{ maxHeight: '800px' }} />
                                    {spaces.filter(s => s.locationMap).map(s => (
                                        <div key={s.id} className={`absolute w-8 h-8 rounded-full border-2 border-white flex items-center justify-center text-xs font-bold text-white transform -translate-x-1/2 -translate-y-1/2 shadow-lg ${s.risk.level === 'HIGH' ? 'bg-red-600 animate-bounce' : s.risk.level === 'MEDIUM' ? 'bg-yellow-500' : 'bg-blue-600'}`} style={{ left: `${s.locationMap.x}%`, top: `${s.locationMap.y}%` }}>
                                            {s.id.split('-')[1]}
                                        </div>
                                    ))}
                                    {pt && <div className="absolute w-4 h-4 bg-black rounded-full opacity-50 transform -translate-x-1/2 -translate-y-1/2" style={{ left: `${pt.x}%`, top: `${pt.y}%` }} />}
                                </div>
                            ) : <div className="text-gray-400">도면 이미지를 업로드하세요 (또는 드래그)</div>}
                        </div>
                    </div>
                    {modal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                            <div className="bg-white p-6 rounded w-96 max-h-[80vh] overflow-auto">
                                <h3 className="font-bold mb-4">설비 배치</h3>
                                {unmapped.map(s => (
                                    <button key={s.id} onClick={() => { setSpaces(spaces.map(x => x.id === s.id ? { ...x, locationMap: pt } : x)); setModal(false); }} className="w-full text-left p-3 border mb-2 rounded hover:bg-gray-100 flex justify-between">
                                        <span>{s.name}</span> <span className={`text-xs px-2 rounded ${s.risk.color}`}>{s.risk.label}</span>
                                    </button>
                                ))}
                                <button onClick={() => setModal(false)} className="w-full p-2 bg-gray-200 rounded mt-4">닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ConclusionScreen({ reportInfo, spaces, defectSummary, checklistResults, setFinalOpinion, finalOpinion, onAutoGenerate, summary, setSummary }) {
            const generate = () => {
                const safeSpaces = spaces || [];
                if (safeSpaces.length === 0) { setFinalOpinion(""); return; }
                const total = safeSpaces.length;
                const high = safeSpaces.filter(s => s.risk && s.risk.level === "HIGH").length;
                const medium = safeSpaces.filter(s => s.risk && s.risk.level === "MEDIUM").length;
                const low = safeSpaces.filter(s => s.risk && s.risk.level === "LOW").length;

                // 설비 명칭별 개수 카운트
                const spaceCounts = safeSpaces.reduce((acc, s) => {
                    acc[s.name] = (acc[s.name] || 0) + 1;
                    return acc;
                }, {});
                const spaceDesc = Object.entries(spaceCounts).map(([name, count]) => `${name} ${count}개소`).join(', ');

                // 초과된 주요 유해요인 추출
                const hazards = new Set();
                spaces.forEach(s => {
                    if (s.gas.o2 < 19.5 || s.gas.o2 > 23.5) hazards.add('산소(O2) 농도 이상');
                    if (s.gas.h2s > 0) hazards.add('황화수소(H2S) 검출');
                    if (s.gas.co > 25) hazards.add('일산화탄소(CO) 초과');
                    if (s.gas.lel > 10) hazards.add('가연성가스(LEL) 초과');
                    if (s.gas.co2 > 1.5) hazards.add('이산화탄소(CO2) 초과');
                });
                const hazardText = hazards.size > 0 ? Array.from(hazards).join(', ') : '특이사항 없음';

                // 등록된 데이터를 바탕으로 동적 사용용도 리스트 생성
                let dynamicUsage = "";
                const usageMap = {};
                spaces.forEach(s => {
                    if (!usageMap[s.name]) usageMap[s.name] = new Set();
                    if (s.cycle) usageMap[s.name].add(s.cycle);
                });
                Object.entries(usageMap).forEach(([name, cycles]) => {
                    const cycleText = Array.from(cycles).join(', ');
                    dynamicUsage += ` - ${name} (${cycleText} 등 내부 진입 및 점검 작업 시 사용)\n`;
                });
                if (!dynamicUsage) dynamicUsage = " - 등록된 밀폐공간 현황 데이터가 없습니다.\n";

                // 보고서 텍스트 조립
                let t = `[1. 평가 개요]\n`;
                t += `1. 대상 사업장: ${reportInfo.companyName || '미입력'}\n`;
                t += `2. 평가 대상: 밀폐공간 총 ${total}개소 (${spaceDesc})\n`;
                t += `3. 평가 기간: ${reportInfo.period}\n`;
                t += `4. 평가 주관: (사)대한산업보건협회 ${reportInfo.agencyBranch}\n`;
                t += `5. 평가 목적:\n`;
                t += ` 1) 중대재해처벌법 제4조(사업주와 경영책임자등의 안전 및 보건 확보의무)\n`;
                t += ` 2) 산업안전보건법 제39조(보건조치)에 따른 밀폐공간에 의한 작업 시 발생 할 수 있는 산소결핍 등 밀폐공간 위험성 사전 파악\n`;
                t += ` 3) 밀폐공간 질식·중독·화재 등 중대 재해 예방\n`;
                t += ` 4) 안전보건관리 대책 수립 및 보완점 도출\n\n`;

                t += `[2. 밀폐공간 현황 및 사용용도]\n`;
                t += `본 사업장의 밀폐공간은 총 ${total}개소로 파악되며, 위험도 평가 결과에 따라 고위험 ${high}개소, 중위험 ${medium}개소, 저위험 ${low}개소로 분류되었습니다.\n`;
                t += `주요 밀폐공간의 사용 용도는 다음과 같습니다.\n`;
                t += dynamicUsage; // 동적으로 생성된 리스트 삽입
                t += `해당 밀폐공간은 산소결핍, 유해가스 축적, 화재·폭발 위험 등 중대 재해 위험이 상존하므로, 용도별 특성을 고려한 맞춤형 안전보건조치가 요구됩니다.\n\n`;

                t += `[3. 결론 및 권고사항]\n`;
                t += `${reportInfo.period.split('(')[0].trim()} 실시한 위험성평가에 따라 총 ${total}곳의 밀폐공간에 대한 평가를 완료하였습니다.\n`;

                if (high > 0 || medium > 0) {
                    t += `평가 결과, 일부 공간은 산소결핍 및 유해가스 농도가 허용기준을 초과하는 등 즉각적인 개선이 필요한 위험 공간으로 분류되었습니다. 주요 위험 요소로는 [${hazardText}] 등이 확인되어 해당 항목의 위험도가 높게 나타났습니다.\n`;
                } else {
                    t += `평가 결과, 유해가스 농도가 기준치 이내로 유지되는 등 전반적인 가스 농도 상태는 양호한 것으로 판단됩니다. 그러나 밀폐공간 특성상 작업 시 언제든 급격한 환경 변화가 발생할 수 있으므로 철저한 대비가 필요합니다.\n`;
                }

                t += `이에 따라 관련 법령 및 KOSHA 가이드라인(H-80-2021)에 의거하여, 사업장에서는 다음의 <질식재해 예방 조치사항>을 반드시 이행할 것을 권고 드립니다.\n\n`;
                t += `<질식재해 예방 조치사항>\n`;
                t += `(1) 밀폐공간의 확인과 출입금지 조치\n`;
                t += `(2) 밀폐공간 작업허가서(PTW) 발급 및 준수\n`;
                t += `(3) 작업 전 및 작업 중 10배 이상 충분한 환기 실시\n`;
                t += `(4) 유해가스 농도 지속 측정 및 모니터링\n`;
                t += `(5) 비상 구출용 보호구 및 장비 비치\n`;
                t += `(6) 작업자, 감시인 대상 특별안전보건교육 훈련\n`;
                t += `(7) 사업장 자체 밀폐공간 작업 프로그램 수립 및 이행`;

                setFinalOpinion(t);
            };
            return (
                <div className="p-4 md:p-8 h-full flex flex-col overflow-auto">
                    <div className="mb-4"><button onClick={generate} className="px-4 py-3 md:py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg text-base transition">📊 초안 자동 작성</button></div>

                    {/* [인쇄 전용] 1-1. 종합 평가 결과표 */}
                    <div className="hidden print:!block w-full mb-8 page-break-inside-avoid">
                        <h3 className="text-xl font-bold text-gray-800 mb-4 border-l-4 border-blue-600 pl-3">■ 1-1. 체크리스트 종합 평가 결과</h3>
                        <table className="w-full border-collapse border border-gray-400 text-sm mb-6">
                            <thead className="bg-gray-100 print:bg-gray-200">
                                <tr>
                                    <th className="border border-gray-400 p-2 w-12 text-center font-bold">NO</th>
                                    <th className="border border-gray-400 p-2 text-center font-bold">점검 항목</th>
                                    <th className="border border-gray-400 p-2 w-24 text-center font-bold">결과</th>
                                </tr>
                            </thead>
                            <tbody>
                                {CHECKLIST_MASTER.flatMap(cat => cat.items).map((item, index) => {
                                    const status = checklistResults[item.id];
                                    return (
                                        <tr key={item.id}>
                                            <td className="border border-gray-400 p-2 text-center text-gray-600">{index + 1}</td>
                                            <td className="border border-gray-400 p-2 text-gray-800">{item.question}</td>
                                            <td className="border border-gray-400 p-2 text-center font-bold">
                                                {status === 'PASS' && <span className="text-blue-600">적합</span>}
                                                {status === 'FAIL' && <span className="text-red-600">부적합</span>}
                                                {status === 'NA' && <span className="text-gray-400">해당없음</span>}
                                                {!status && <span className="text-gray-300">-</span>}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    {/* [화면 & 인쇄 공통] 1-2. 부적합 항목 개선 대책 */}
                    <div className="w-full mb-6 page-break-inside-avoid">
                        <h3 className="text-xl font-bold text-gray-800 mb-4 border-l-4 border-blue-600 pl-3 bg-gray-50 py-1">
                            <span className="print:hidden">■ 총평 및 의견</span>
                            <span className="hidden print:inline">■ 1-2. 부적합 항목 개선 대책</span>
                        </h3>
                    </div>

                    <textarea className="flex-1 p-4 border rounded resize-none min-h-[300px] text-base" value={finalOpinion} onChange={e => setFinalOpinion(e.target.value)} />
                </div>
            );
        }

        const DiagnosisScreen = (props) => {
            const [step, setStep] = useState(1);
            const [hasSpace, setHasSpace] = useState(null);
            const [hasWork, setHasWork] = useState(null);
            const [showGuideModal, setShowGuideModal] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null); // 사진 확대 모달
            const reset = () => { setStep(1); setHasSpace(null); setHasWork(null); };

            const confinedSpaceExamples = [
                { id: 1, name: '강제반응탑', desc: '화학물질 잔류 및 반응 가스 체류', imgSrc: './images/space1.png' },
                { id: 2, name: '보일러 연통 내부', desc: '일산화탄소 등 연소가스 체류', imgSrc: './images/space2.png' },
                { id: 3, name: '선창 내부', desc: '화물 산화로 인한 극심한 산소결핍', imgSrc: './images/space3.png' },
                { id: 4, name: '음식물 저장 호퍼', desc: '유기물 부패로 인한 황화수소 발생', imgSrc: './images/space4.png' },
                { id: 5, name: '주류발효탱크', desc: '발효 중 이산화탄소 급증 및 산소결핍', imgSrc: './images/space5.png' },
                { id: 6, name: '식품발효 및 저장조', desc: '발효 가스 생성 및 산소 소모', imgSrc: './images/space6.png' },
                { id: 7, name: '하수처리장 침전지', desc: '슬러지 부패로 인한 황화수소 중독', imgSrc: './images/space7.png' },
                { id: 8, name: '오수처리장 정화조', desc: '고농도 황화수소 및 메탄가스 발생', imgSrc: './images/space8.png' },
                { id: 9, name: '분뇨 처리장', desc: '복합 유해가스 및 산소결핍', imgSrc: './images/space9.png' },
                { id: 10, name: '냉동창고 내부', desc: '냉매 누출 및 드라이아이스 승화 위험', imgSrc: './images/space10.png' },
                { id: 11, name: '폐수침전조', desc: '폐수 찌꺼기 부패로 인한 독성 가스', imgSrc: './images/space11.png' },
                { id: 12, name: '반응기', desc: '세척용제 증기 및 잔류 가스 중독', imgSrc: './images/space12.png' },
                { id: 13, name: '원료저장탱크', desc: '내부 산화 및 유기용제 증기 체류', imgSrc: './images/space13.png' },
                { id: 14, name: '용접/비파괴 배관 내부', desc: '아르곤 등 불활성기체로 인한 산소결핍', imgSrc: './images/space14.png' },
                { id: 15, name: '공기정화장치 내부', desc: '유해물질 축적 및 환기 불량', imgSrc: './images/space15.png' },
                { id: 16, name: '지하 피트', desc: '환기 불량으로 인한 각종 유해가스 정체', imgSrc: './images/space16.png' },
                { id: 17, name: '콘크리트 양생장소', desc: '갈탄/목탄 연소에 의한 일산화탄소 중독', imgSrc: './images/space17.png' },
                { id: 18, name: '바지선 부력탱크', desc: '철판 산화(녹)로 인한 극심한 산소결핍', imgSrc: './images/space18.png' },
                { id: 19, name: '하수도 맨홀', desc: '산소결핍 및 황화수소, 가연성 가스', imgSrc: './images/space19.png' },
                { id: 20, name: '상수도 맨홀', desc: '내부 부식 및 미생물 호흡으로 인한 산소결핍', imgSrc: './images/space20.png' },
            ];

            return (
                <div className="p-4 md:p-8 max-w-4xl mx-auto">
                    {/* 제목 및 도움말 버튼 */}
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                            <Icon name="compass" className="text-blue-600" /> 사업장 밀폐공간 자가진단
                        </h2>
                        <button
                            onClick={() => setShowGuideModal(true)}
                            className="flex items-center gap-2 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-full px-4 py-2 text-sm font-semibold shadow-sm transition-all shrink-0"
                        >
                            💡 밀폐공간 20종류 사진으로 확인하기
                        </button>
                    </div>

                    <div className="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-gray-200 min-h-[400px] flex flex-col justify-center items-center text-center">

                        {step === 1 && (
                            <div className="w-full">
                                <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="search" size={32} />
                                </div>
                                <h3 className="text-xl md:text-2xl font-bold mb-3 leading-relaxed">Q1. 우리 사업장에 '밀폐공간'이 존재합니까?</h3>
                                <p className="text-gray-500 text-sm md:text-base mb-6">(※ 환기가 불충분하거나 유해가스가 정체될 수 있는 정화조, 맨홀, 탱크, 핏트 등)</p>
                                <div className="flex flex-col sm:flex-row gap-3 justify-center">
                                    <button onClick={() => { setHasSpace(true); setStep(2); }} className="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold text-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                                        <Icon name="check-circle" /> 네, 존재합니다
                                    </button>
                                    <button onClick={() => { setHasSpace(false); setStep(3); }} className="px-8 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-lg hover:bg-gray-300 transition-all flex items-center justify-center gap-2">
                                        <Icon name="x-circle" /> 아니요, 없습니다
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="w-full">
                                <div className="w-16 h-16 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="users" size={32} />
                                </div>
                                <h3 className="text-xl md:text-2xl font-bold mb-3 leading-relaxed">Q2. 해당 밀폐공간 내부로 근로자가 출입하여 '작업'을 합니까?</h3>
                                <p className="text-gray-500 text-sm md:text-base mb-6">(※ 청소, 점검, 보수, 구출 등 일체의 출입 행위 포함)</p>
                                <div className="flex flex-col sm:flex-row gap-3 justify-center">
                                    <button onClick={() => { setHasWork(true); setStep(3); }} className="px-8 py-3 bg-orange-500 text-white rounded-xl font-bold text-lg hover:bg-orange-600 transition-all flex items-center justify-center gap-2">
                                        <Icon name="check-circle" /> 네, 출입하여 작업합니다
                                    </button>
                                    <button onClick={() => { setHasWork(false); setStep(3); }} className="px-8 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-lg hover:bg-gray-300 transition-all flex items-center justify-center gap-2">
                                        <Icon name="x-circle" /> 아니요, 출입하지 않습니다
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="w-full text-left">
                                {hasSpace === false && (
                                    <div className="bg-slate-50 border border-slate-200 p-8 rounded-xl text-center">
                                        <div className="inline-block p-4 bg-green-100 text-green-600 rounded-full mb-4"><Icon name="smile" size={40} /></div>
                                        <h3 className="text-2xl font-bold text-slate-800 mb-2">밀폐공간 관리 대상 아님</h3>
                                        <p className="text-gray-600">현재 사업장에 법적 밀폐공간이 없으므로, 관련된 추가 조치는 필요하지 않습니다.<br />(단, 향후 설비 신설 시 재평가 필요)</p>
                                    </div>
                                )}
                                {hasSpace === true && hasWork === false && (
                                    <div className="bg-yellow-50 border border-yellow-200 p-6 md:p-8 rounded-xl">
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="p-3 bg-yellow-100 text-yellow-600 rounded-full"><Icon name="lock" size={28} /></div>
                                            <h3 className="text-2xl font-bold text-yellow-800">기본 유지관리 대상 (작업 금지)</h3>
                                        </div>
                                        <p className="text-yellow-700 mb-6 font-medium">밀폐공간은 존재하지만 출입 작업이 없는 경우, 무단 출입으로 인한 사고를 막기 위해 아래 3가지 법적 의무를 반드시 이행해야 합니다.</p>
                                        <ul className="space-y-4">
                                            <li className="bg-white p-4 rounded-lg border border-yellow-100 shadow-sm">
                                                <strong className="text-gray-800 flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm">1</span>밀폐공간 파악 및 목록화 (안전보건규칙 제619조)</strong>
                                                <p className="text-gray-600 mt-1 text-sm pl-8">밀폐공간의 위치, 종류, 수량, 위험 요인 등을 사전에 파악하여 목록화하고 해당 문서를 보존해야 합니다. <span className="text-blue-600 font-medium">앱 하단의 [다운로드] 탭에서 '밀폐공간 보건작업 프로그램' 양식을 받아 쉽게 작성하고 관리할 수 있습니다.</span></p>
                                            </li>
                                            <li className="bg-white p-4 rounded-lg border border-yellow-100 shadow-sm">
                                                <strong className="text-gray-800 flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm">2</span>출입금지 표지 부착 (안전보건규칙 제622조)</strong>
                                                <p className="text-gray-600 mt-1 text-sm pl-8">누구나 쉽게 볼 수 있도록 밀폐공간 입구 근처에 법적 양식(별지 제4호서식)에 따른 '출입금지 표지'를 훼손되지 않게 게시해야 합니다. <span className="text-blue-600 font-medium">앱 하단의 [다운로드] 탭에서 법적 양식에 맞는 '출입금지 표지'를 즉시 출력하여 부착하십시오.</span></p>
                                            </li>
                                            <li className="bg-white p-4 rounded-lg border border-yellow-100 shadow-sm">
                                                <strong className="text-gray-800 flex items-center gap-2"><span className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm">3</span>출입 통제 및 시건장치 설치 (안전보건규칙 제622조)</strong>
                                                <p className="text-gray-600 mt-1 text-sm pl-8">비인가자의 호기심이나 실수로 인한 출입을 원천 통제하기 위해, 해당 밀폐공간 출입구에 자물쇠 등 시건장치를 설치하고 관리자가 열쇠를 통제해야 합니다.</p>
                                            </li>
                                        </ul>
                                        <button
                                            onClick={() => props.onFastTrack && props.onFastTrack()}
                                            className="mt-6 w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-lg font-bold rounded-xl shadow-lg hover:from-blue-700 hover:to-indigo-700 transition transform hover:-translate-y-1 flex justify-center items-center gap-2"
                                        >
                                            🚀 밀폐공간 프로그램(법정 양식) 1분 만에 자동 완성하기
                                        </button>
                                    </div>
                                )}
                                {hasSpace === true && hasWork === true && (
                                    <div className="bg-red-50 border border-red-200 p-6 md:p-8 rounded-xl text-center">
                                        <div className="inline-block p-4 bg-red-100 text-red-600 rounded-full mb-4"><Icon name="alert-triangle" size={40} /></div>
                                        <h3 className="text-xl md:text-2xl font-bold text-red-800 mb-2 leading-relaxed">고위험 밀폐공간 작업 대상</h3>
                                        <p className="text-red-700 mb-6 text-sm md:text-base">사전 위험성평가, 작업허가서 발급, 산소/유해가스 측정, 환기 등 엄격한 절차가 필요합니다.</p>
                                        <p className="text-gray-700 font-bold bg-white inline-block px-6 py-3 rounded-lg border border-red-100">👉 화면 하단(PC는 좌측)의 [표지] 탭을 눌러 즉시 위험성평가를 시작하십시오!</p>
                                    </div>
                                )}
                                <div className="mt-8 text-center">
                                    <button onClick={reset} className="px-6 py-2 bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-lg text-sm transition-colors flex items-center justify-center gap-2 mx-auto">
                                        <Icon name="rotate-ccw" size={16} /> 다시 진단하기
                                    </button>
                                </div>
                            </div>
                        )}

                    </div>

                    {/* 밀폐공간 20종류 갤러리 모달 */}
                    {showGuideModal && (
                        <div
                            className="fixed inset-0 bg-black bg-opacity-75 z-[90] flex justify-center items-end md:items-center p-0 md:p-4 print:hidden"
                            onClick={() => setShowGuideModal(false)}
                        >
                            <div
                                className="bg-white w-full md:max-w-5xl md:rounded-2xl rounded-t-2xl max-h-[92vh] flex flex-col shadow-2xl"
                                onClick={e => e.stopPropagation()}
                            >
                                {/* 모달 헤더 */}
                                <div className="flex items-center justify-between px-5 py-4 border-b border-gray-200 shrink-0">
                                    <div>
                                        <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                            <Icon name="alert-triangle" className="text-red-500" size={20} />
                                            질식재해 발생 가능 주요 장소 20종
                                        </h3>
                                        <p className="text-xs text-gray-500 mt-0.5">카드를 클릭하면 사진을 크게 볼 수 있습니다</p>
                                    </div>
                                    <button
                                        onClick={() => setShowGuideModal(false)}
                                        className="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-red-100 hover:text-red-600 rounded-full text-gray-500 font-bold transition-colors shrink-0"
                                        aria-label="닫기"
                                    >
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                {/* 갤러리 그리드 */}
                                <div className="overflow-y-auto p-4">
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                                        {confinedSpaceExamples.map((item) => (
                                            <div
                                                key={item.id}
                                                onClick={(e) => { e.stopPropagation(); setSelectedItem(item); }}
                                                className="bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md hover:border-red-200 hover:-translate-y-0.5 transition-all overflow-hidden group cursor-pointer"
                                            >
                                                <div className="aspect-video bg-slate-100 overflow-hidden relative flex items-center justify-center">
                                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 gap-1">
                                                        <Icon name="camera" size={22} className="opacity-40" />
                                                    </div>
                                                    <img
                                                        src={item.imgSrc}
                                                        alt={item.name}
                                                        className="absolute inset-0 w-full h-full object-cover z-10 group-hover:scale-105 transition-transform duration-300"
                                                        onError={(e) => { e.target.style.display = 'none'; }}
                                                    />
                                                </div>
                                                <div className="p-2">
                                                    <div className="flex items-center gap-1 mb-0.5">
                                                        <span className="text-[10px] font-bold bg-red-100 text-red-600 px-1.5 py-0.5 rounded shrink-0">NO.{item.id}</span>
                                                        <span className="font-bold text-xs text-gray-800 leading-tight truncate">{item.name}</span>
                                                    </div>
                                                    <p className="text-[11px] text-gray-500 leading-snug">{item.desc}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {/* 모달 푸터 */}
                                <div className="px-5 py-3 border-t border-gray-100 shrink-0 text-center">
                                    <button
                                        onClick={() => setShowGuideModal(false)}
                                        className="px-6 py-2.5 bg-blue-600 text-white rounded-full font-semibold text-sm hover:bg-blue-700 transition-colors"
                                    >
                                        확인했습니다 — 자가진단으로 돌아가기
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 사진 확대 모달 - 도움말 모달보다 위에 렌더링 (z-[200]) */}
                    {selectedItem && (
                        <div
                            className="fixed inset-0 bg-black bg-opacity-80 z-[200] flex justify-center items-center p-4 print:hidden"
                            onClick={(e) => { e.stopPropagation(); setSelectedItem(null); }}
                        >
                            <div
                                className="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto p-6 relative shadow-2xl"
                                onClick={e => e.stopPropagation()}
                            >
                                <button
                                    onClick={(e) => { e.stopPropagation(); setSelectedItem(null); }}
                                    className="absolute top-4 right-4 w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-red-100 hover:text-red-600 rounded-full text-gray-500 text-xl font-bold transition-colors z-10"
                                    aria-label="닫기"
                                >
                                    <Icon name="x" size={20} />
                                </button>
                                <div className="flex items-center gap-3 mb-4">
                                    <span className="text-sm font-bold bg-red-600 text-white px-3 py-1 rounded-full">NO.{selectedItem.id}</span>
                                    <h2 className="text-2xl font-bold text-gray-900">{selectedItem.name}</h2>
                                </div>
                                <div className="w-full bg-slate-100 rounded-xl overflow-hidden mb-4 flex items-center justify-center min-h-[200px] relative">
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 gap-2">
                                        <Icon name="camera" size={40} className="opacity-30" />
                                        <span className="text-sm opacity-30">사진 준비 중</span>
                                    </div>
                                    <img
                                        src={selectedItem.imgSrc}
                                        alt={selectedItem.name}
                                        className="relative z-10 w-full h-auto object-contain rounded-lg"
                                        onError={e => { e.target.style.display = 'none'; }}
                                    />
                                </div>
                                <div className="bg-red-50 border border-red-200 rounded-xl p-4">
                                    <div className="flex items-start gap-3">
                                        <span className="shrink-0 w-8 h-8 bg-red-600 text-white rounded-full flex items-center justify-center mt-0.5">
                                            <Icon name="alert-triangle" size={16} />
                                        </span>
                                        <div>
                                            <p className="font-bold text-red-700 text-base mb-1">주요 위험 요인</p>
                                            <p className="text-gray-700 text-base leading-relaxed">{selectedItem.desc}</p>
                                        </div>
                                    </div>
                                 </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const GuideScreen = ({ onSelect }) => {
            const confinedSpaceExamples = [
                { id: 1, name: '강제반응탑', desc: '화학물질 잔류 및 반응 가스 체류', imgSrc: './images/space1.png' },
                { id: 2, name: '보일러 연통 내부', desc: '일산화탄소 등 연소가스 체류', imgSrc: './images/space2.png' },
                { id: 3, name: '선창 내부', desc: '화물 산화로 인한 극심한 산소결핍', imgSrc: './images/space3.png' },
                { id: 4, name: '음식물 저장 호퍼', desc: '유기물 부패로 인한 황화수소 발생', imgSrc: './images/space4.png' },
                { id: 5, name: '주류발효탱크', desc: '발효 중 이산화탄소 급증 및 산소결핍', imgSrc: './images/space5.png' },
                { id: 6, name: '식품발효 및 저장조', desc: '발효 가스 생성 및 산소 소모', imgSrc: './images/space6.png' },
                { id: 7, name: '하수처리장 침전지', desc: '슬러지 부패로 인한 황화수소 중독', imgSrc: './images/space7.png' },
                { id: 8, name: '오수처리장 정화조', desc: '고농도 황화수소 및 메탄가스 발생', imgSrc: './images/space8.png' },
                { id: 9, name: '분뇨 처리장', desc: '복합 유해가스 및 산소결핍', imgSrc: './images/space9.png' },
                { id: 10, name: '냉동창고 내부', desc: '냉매 누출 및 드라이아이스 승화 위험', imgSrc: './images/space10.png' },
                { id: 11, name: '폐수침전조', desc: '폐수 찌꺼기 부패로 인한 독성 가스', imgSrc: './images/space11.png' },
                { id: 12, name: '반응기', desc: '세척용제 증기 및 잔류 가스 중독', imgSrc: './images/space12.png' },
                { id: 13, name: '원료저장탱크', desc: '내부 산화 및 유기용제 증기 체류', imgSrc: './images/space13.png' },
                { id: 14, name: '용접/비파괴 배관 내부', desc: '아르곤 등 불활성기체로 인한 산소결핍', imgSrc: './images/space14.png' },
                { id: 15, name: '공기정화장치 내부', desc: '유해물질 축적 및 환기 불량', imgSrc: './images/space15.png' },
                { id: 16, name: '지하 피트', desc: '환기 불량으로 인한 각종 유해가스 정체', imgSrc: './images/space16.png' },
                { id: 17, name: '콘크리트 양생장소', desc: '갈탄/목탄 연소에 의한 일산화탄소 중독', imgSrc: './images/space17.png' },
                { id: 18, name: '바지선 부력탱크', desc: '철판 산화(녹)로 인한 극심한 산소결핍', imgSrc: './images/space18.png' },
                { id: 19, name: '하수도 맨홀', desc: '산소결핍 및 황화수소, 가연성 가스', imgSrc: './images/space19.png' },
                { id: 20, name: '상수도 맨홀', desc: '내부 부식 및 미생물 호흡으로 인한 산소결핍', imgSrc: './images/space20.png' },
            ];
            return (
                <div className="p-4 md:p-8 max-w-7xl mx-auto pb-20">
                    {/* 상단 헤더 */}
                    <div className="mb-8">
                        <h2 className="text-2xl md:text-3xl font-extrabold text-slate-800 mb-3 flex items-center gap-3">
                            <span className="inline-flex items-center justify-center w-10 h-10 rounded-full bg-red-600 text-white shrink-0">
                                <Icon name="alert-triangle" size={20} />
                            </span>
                            질식재해가 발생할 수 있는 주요 장소
                        </h2>
                        <p className="text-gray-600 leading-relaxed text-sm md:text-base pl-1 border-l-4 border-red-400 ml-1 pl-4">
                            우리 주변에서 흔히 볼 수 있는 아래의 장소들은 산소결핍이나 유해가스로 인한 치명적인 질식 위험이 존재합니다.
                            <span className="ml-2 text-red-500 font-semibold">📷 클릭하면 사진을 크게 볼 수 있습니다.</span>
                        </p>
                    </div>

                    {/* 갤러리 그리드 */}
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4">
                        {confinedSpaceExamples.map((item) => (
                            <div
                                key={item.id}
                                onClick={() => onSelect(item)}
                                className="bg-white rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg hover:border-red-300 hover:-translate-y-1 transition-all overflow-hidden group cursor-pointer"
                            >
                                {/* 이미지 영역 */}
                                <div className="aspect-video bg-slate-100 rounded-t-xl overflow-hidden relative flex items-center justify-center">
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 gap-1">
                                        <Icon name="camera" size={28} className="opacity-40" />
                                        <span className="text-xs opacity-40">사진 준비 중</span>
                                    </div>
                                    <img
                                        src={item.imgSrc}
                                        alt={item.name}
                                        className="absolute inset-0 w-full h-full object-cover z-10 group-hover:scale-105 transition-transform duration-300"
                                        onError={(e) => { e.target.style.display = 'none'; }}
                                    />
                                    {/* 확대 힌트 오버레이 */}
                                    <div className="absolute inset-0 z-20 bg-black bg-opacity-0 group-hover:bg-opacity-20 flex items-center justify-center transition-all duration-200">
                                        <span className="opacity-0 group-hover:opacity-100 transition-opacity duration-200 bg-white text-gray-800 text-xs font-bold px-2 py-1 rounded-full shadow">
                                            🔍 크게 보기
                                        </span>
                                    </div>
                                </div>
                                {/* 텍스트 영역 */}
                                <div className="p-3">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className="text-[10px] font-bold bg-red-100 text-red-600 px-1.5 py-0.5 rounded">NO.{item.id}</span>
                                        <h3 className="font-bold text-sm text-gray-800 leading-tight truncate">{item.name}</h3>
                                    </div>
                                    <p className="text-xs text-gray-500 leading-snug">{item.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ProgramScreen = ({ info, setInfo, spaces, setSpaces, onProgramDownload }) => {
            const set = (key, val) => setInfo(prev => ({ ...prev, [key]: val }));
            const setManager = (idx, field, val) => setInfo(prev => {
                const managers = prev.managers.map((m, i) => i === idx ? { ...m, [field]: val } : m);
                return { ...prev, managers };
            });
            const setSpaceField = (id, field, val) =>
                setSpaces(prev => prev.map(s => s.id === id ? { ...s, [field]: val } : s));

            const Toggle = ({ on, onToggle }) => (
                <button type="button" onClick={onToggle}
                    className={`w-12 h-6 rounded-full transition-colors shrink-0 ${on ? 'bg-teal-500' : 'bg-gray-300'}`}>
                    <span className={`block w-5 h-5 bg-white rounded-full shadow transition-transform mx-0.5 ${on ? 'translate-x-6' : 'translate-x-0'}`} />
                </button>
            );

            return (
                <div className="p-4 md:p-8 max-w-2xl mx-auto pb-24">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2">
                            <Icon name="clipboard-list" className="text-teal-600" /> 밀폐공간 작업프로그램
                        </h2>
                        <button
                            onClick={onProgramDownload}
                            className="px-5 py-2.5 bg-teal-600 text-white font-bold rounded-lg shadow hover:bg-teal-700 transition flex items-center gap-2 shrink-0"
                        >
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            프로그램 다운로드 (PDF)
                        </button>
                    </div>
                    <div className="space-y-4">

                        {/* 1. 제정/개정 일자 */}
                        <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                            <div className="text-sm font-bold text-gray-600 mb-3">제정 / 개정 일자</div>
                            <div className="flex gap-3 mb-3">
                                {['제정', '개정'].map(t => (
                                    <button key={t} type="button"
                                        onClick={() => set('revisionType', t)}
                                        className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 transition-colors ${info.revisionType === t
                                            ? 'bg-teal-600 text-white border-teal-600'
                                            : 'bg-white text-gray-500 border-gray-200 hover:border-teal-400'
                                            }`}>
                                        {t}
                                    </button>
                                ))}
                            </div>
                            <label className="text-xs text-gray-500">{info.revisionType}일자</label>
                            <input type="date" value={info.revisionDate}
                                onChange={e => set('revisionDate', e.target.value)}
                                className="w-full mt-1 p-2 border rounded-lg text-sm" />
                        </div>

                        {/* 2. 밀폐공간 현황 연동 */}
                        <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                            <div className="text-sm font-bold text-gray-600 mb-3">밀폐공간별 작업정보 입력
                                <span className="ml-2 text-xs font-normal text-gray-400">(현황 탭에서 등록한 데이터 자동 연동)</span>
                            </div>
                            {spaces.length === 0 ? (
                                <p className="text-sm text-gray-400 text-center py-4">현황 탭에서 밀폐공간을 먼저 등록해 주세요.</p>
                            ) : spaces.map(s => (
                                <div key={s.id} className="mb-4 border border-gray-100 rounded-xl overflow-hidden">
                                    {/* 상단: 읽기전용 */}
                                    <div className="flex gap-3 p-3 bg-gray-50 items-start">
                                        {s.photo
                                            ? <img src={s.photo} className="w-14 h-14 object-cover rounded-lg shrink-0 border" />
                                            : <div className="w-14 h-14 bg-gray-200 rounded-lg shrink-0 flex items-center justify-center text-gray-400"><Icon name="image" size={22} /></div>
                                        }
                                        <div className="min-w-0">
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <span className="text-xs font-bold bg-slate-700 text-white px-2 py-0.5 rounded">{s.id}</span>
                                                <span className={`text-xs font-bold px-2 py-0.5 rounded ${s.risk.color}`}>{s.risk.label}</span>
                                            </div>
                                            <p className="font-bold text-sm mt-1 truncate">{s.name}</p>
                                            <p className="text-xs text-gray-500 truncate">{s.location}</p>
                                            <p className="text-xs text-blue-600 mt-0.5">
                                                O₂:{s.gas.o2} H₂S:{s.gas.h2s} CO:{s.gas.co} LEL:{s.gas.lel} CO₂:{s.gas.co2}
                                            </p>
                                        </div>
                                    </div>
                                    {/* 하단: 추가 입력 */}
                                    <div className="p-3 space-y-2 bg-white">
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="col-span-2">
                                                <label className="text-xs text-gray-500">작업내용</label>
                                                <select value={s.progWorkType || ''}
                                                    onChange={e => setSpaceField(s.id, 'progWorkType', e.target.value)}
                                                    className="w-full mt-1 p-1.5 border rounded text-xs">
                                                    <option value="">선택</option>
                                                    {['내부청소', '설비점검', '보수작업', '용접', '비파괴검사', '배관작업', '기타'].map(o => <option key={o}>{o}</option>)}
                                                </select>
                                                {s.progWorkType === '기타' && (
                                                    <input
                                                        type="text"
                                                        value={s.progWorkTypeDetail || ''}
                                                        onChange={e => setSpaceField(s.id, 'progWorkTypeDetail', e.target.value)}
                                                        placeholder="작업 내용을 직접 입력하세요"
                                                        className="w-full mt-1 p-1.5 border border-teal-300 rounded text-xs focus:outline-none focus:ring-1 focus:ring-teal-400"
                                                    />
                                                )}
                                            </div>
                                            <div>
                                                <label className="text-xs text-gray-500">작업빈도</label>
                                                <div className="w-full mt-1 p-1.5 bg-gray-50 border border-gray-200 rounded text-xs text-gray-700 font-medium">
                                                    {s.cycle || '현황 탭에서 입력'}
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-xs text-gray-500">근로자 수</label>
                                                <div className="w-full mt-1 p-1.5 bg-gray-50 border border-gray-200 rounded text-xs text-gray-700 font-medium">
                                                    {s.personnel || '현황 탭에서 입력'}
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-xs text-gray-500 block mb-1">작업허가서</label>
                                                <div className="flex items-center gap-2 mt-1.5">
                                                    <Toggle on={!!s.progPermit} onToggle={() => setSpaceField(s.id, 'progPermit', !s.progPermit)} />
                                                    <span className="text-xs font-bold">{s.progPermit ? '유' : '무'}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* 3. 관리책임자 5인 */}
                        <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                            <div className="text-sm font-bold text-gray-600 mb-3">관리 책임자 및 연락망</div>
                            <div className="space-y-3">
                                {info.managers.map((m, i) => (

                        <ul className="space-y-6 text-xl text-black">
                            <li className="flex justify-between border-b border-dotted pb-2"><span>1. 체크리스트 결과</span><span>3p</span></li>
                            <li className="flex justify-between border-b border-dotted pb-2"><span>2. 현황 배치도</span><span>4p</span></li>
                            <li className="flex justify-between border-b border-dotted pb-2"><span>3. 위험성평가 결과 및 등급</span><span>5p</span></li>

                    {/* 3. 체크리스트 결과 (페이지 자동 넘어감) */}
                    <div className="print-page print-flow-page">

                        {/* 1-1. 체크리스트 종합 평가 결과표 */}
                        <div className="break-inside-avoid mb-8">
                            <h2 className="text-2xl font-bold border-b-2 border-black pb-2 mb-4">1. 체크리스트 결과</h2>
                            <h3 className="text-lg font-bold text-gray-800 mb-3 border-l-4 border-blue-600 pl-3 bg-gray-50 py-1">■ 1-1. 체크리스트 종합 평가 결과</h3>
                            <table className="w-full border-collapse border border-gray-400 text-sm">

                                    {(checklistAll && checklistAll.length > 0 ? checklistAll : []).map((item, index) => (

                                            <td className="border border-gray-400 p-2 text-gray-800">{item.question}</td>
                                            <td className="border border-gray-400 p-2 text-center font-bold">
                                                {item.status === 'PASS' && <span className="text-blue-600">적합</span>}
                                                {item.status === 'FAIL' && <span className="text-red-600">부적합</span>}

                            </table>
                        </div>

                        {/* 1-2. 부적합 항목 개선 대책 (기존 로직 유지) */}
                        <div className="break-inside-avoid">
                            <h3 className="text-lg font-bold text-gray-800 mb-4 border-l-4 border-blue-600 pl-3 bg-gray-50 py-1">■ 1-2. 부적합 항목 개선 대책</h3>
                            {defectSummary.length === 0
                                ? <div className="text-center p-10 bg-gray-100 break-inside-avoid">지적사항 없음</div>
                                : defectSummary.map((d, i) => (
                                    <div key={i} className="mb-4 border border-red-200 p-4 rounded bg-red-50 break-inside-avoid">

                    </div>

                    {/* [문제 3 완벽 해결] 4. 현황 배치도 및 범례 (무조건 1페이지 고정) */}
                    <div className="print-page print-fixed-page">
                        <h2 className="text-2xl font-bold border-b-2 border-black pb-2 mb-4 shrink-0">2. 현황 배치도</h2>
                        {/* 도면 박스 높이를 140mm로 고정하여 범례가 들어갈 자리를 확실히 확보 */}
                        <div className="flex-1 w-full border flex items-center justify-center relative overflow-hidden" style={{ maxHeight: '140mm' }}>
                            {mapImage ? (
                                <div className="relative inline-block w-full h-full flex justify-center items-center">
                                    <img src={mapImage} className="max-w-full max-h-full object-contain" />
                                    {spaces.filter(s => s.locationMap).map(s => {
                                        // 1단계 가스 적합성 판정
                                        const o2 = Number(s.o2) || 0;
                                        const h2s = Number(s.h2s) || 0;
                                        const co = Number(s.co) || 0;
                                        const lel = Number(s.lel) || 0;
                                        const co2 = Number(s.co2) || 0;

                                        let gasLevel = 1;
                                        if (o2 < 10.0 || h2s >= 100 || co >= 1200 || lel >= 25 || co2 >= 4.0) gasLevel = 4;
                                        else if ((o2 >= 10.0 && o2 < 18.0) || o2 >= 23.5 || (h2s >= 10 && h2s < 100) || (co >= 30 && co < 1200) || (lel >= 10 && lel < 25) || (co2 >= 1.5 && co2 < 4.0)) gasLevel = 3;
                                        else if ((o2 >= 18.0 && o2 < 19.5) || (h2s >= 5 && h2s < 10) || (co >= 15 && co < 30) || (lel >= 5 && lel < 10) || (co2 >= 0.5 && co2 < 1.5)) gasLevel = 2;

                                        // 2단계 매트릭스 점수 산출
                                        const mA = Number(s.matrixA) || 1;
                                        const mB = Number(s.matrixB) || 1;
                                        const mC = Number(s.matrixC) || 1;
                                        const score = mA * mB * mC;

                                        let matrixLevel = 1;
                                        if (score >= 13) matrixLevel = 4;
                                        else if (score >= 9) matrixLevel = 3;
                                        else if (score >= 5) matrixLevel = 2;

                                        // 최종 등급 판정 (Max Rule)
                                        const finalLevel = Math.max(gasLevel, matrixLevel);

                                        let markerClass = '';
                                        if (finalLevel === 4) {
                                            markerClass = 'bg-red-600 animate-bounce'; // 초고위험 (뛰는 애니메이션)
                                        } else if (finalLevel === 3) {
                                            markerClass = 'bg-orange-500'; // 고위험
                                        } else if (finalLevel === 2) {
                                            markerClass = 'bg-yellow-500'; // 중위험
                                        } else {
                                            markerClass = 'bg-green-600'; // 저위험
                                        }

                                        return (
                                            <div key={s.id} className={`absolute w-8 h-8 rounded-full border-2 border-white flex items-center justify-center text-xs font-bold text-white transform -translate-x-1/2 -translate-y-1/2 shadow-lg ${markerClass}`} style={{ left: `${s.locationMap.x}%`, top: `${s.locationMap.y}%` }}>
                                                {s.id.split('-')[1]}
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : <span className="text-gray-400">배치도 이미지 없음</span>}

                        {/* 8페이지로 도망가던 범례를 도면 바로 밑으로 고정 */}

                            <span className="flex items-center gap-1"><span className="w-4 h-4 bg-orange-500 rounded-full border"></span> 고위험</span>
                            <span className="flex items-center gap-1"><span className="w-4 h-4 bg-yellow-500 rounded-full border"></span> 중위험</span>

                        </div>
                    </div>

                    {/* 5. 위험성평가 결과 요약 (페이지 자동 넘어감) */}
